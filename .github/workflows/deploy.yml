name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      # ── CDK deploy ───────────────────────────────────────────────────────────
      - name: Install infra dependencies
        run: npm ci
        working-directory: infra

      - name: Build infra
        run: npm run build
        working-directory: infra

      - name: CDK deploy all stacks
        run: npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: eu-central-1

      # ── Extract CDK outputs ──────────────────────────────────────────────────
      - name: Extract CDK outputs
        id: cdk
        run: |
          API_URL=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['AutoAwApi']['ApiUrl'])")
          BUCKET=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['AutoAwFrontend']['SiteBucketName'])")
          DIST_ID=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['AutoAwFrontend']['DistributionId'])")
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "dist_id=$DIST_ID" >> $GITHUB_OUTPUT
        working-directory: infra

      # ── Frontend build ───────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.cdk.outputs.api_url }}

      # ── Deploy frontend ──────────────────────────────────────────────────────
      - name: Sync to S3
        run: aws s3 sync out/ s3://${{ steps.cdk.outputs.bucket }} --delete --region eu-central-1
        working-directory: frontend

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.cdk.outputs.dist_id }} --paths "/*"

      - name: Print URLs
        run: |
          echo "API: ${{ steps.cdk.outputs.api_url }}"
          cat infra/cdk-outputs.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('Frontend:', d['AutoAwFrontend']['CloudFrontUrl'])"
